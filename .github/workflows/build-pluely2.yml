name: "build-pluely2"

on:
  workflow_dispatch:  # 手动触发

jobs:
  build-macos:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            args: "--target aarch64-apple-darwin"
          - platform: "macos-latest"
            args: "--target x86_64-apple-darwin"

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: "aarch64-apple-darwin,x86_64-apple-darwin"

      - name: Create environment file
        run: |
          echo "API_ACCESS_KEY=" > src-tauri/.env
          echo "PAYMENT_ENDPOINT=" >> src-tauri/.env
          echo "APP_ENDPOINT=" >> src-tauri/.env
          echo "POSTHOG_API_KEY=" >> src-tauri/.env

      - name: Install frontend deps
        run: npm ci

      - name: Build
        uses: tauri-apps/tauri-action@v0.5.16
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: pluely2-v__VERSION__
          releaseName: "Pluely2 v__VERSION__"
          releaseBody: "Pluely2 macOS build"
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
